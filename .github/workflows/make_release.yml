name: Download and release prebuilt glslang

on:
  workflow_dispatch:
    inputs:
      vulkan_sdk_version:
        description: 'The Vulkan SDK version to download glslang from'
        required: true
        type: string
      glslang_version:
        description: 'The version of glslang to release'
        required: true
        type: string

env:
  WINDOWS_ARTIFACT_NAME: glslang-${{ inputs.glslang_version }}-windows-x86_64
  LINUX_ARTIFACT_NAME: glslang-${{ inputs.glslang_version }}-linux-x86_64

permissions:
  contents: write

jobs:
  glslang-prebuilt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          path: ./repo
      - name: Run make_release.sh
        run: ./repo/make_release.sh ${{ inputs.vulkan_sdk_version }} ${{ inputs.glslang_version }}
      - name: Commit and tag release
        working-directory: ./repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add glslang/release_info.bzl
          git commit -m "Release glslang ${{ inputs.glslang_version }}"
          git tag -a v${{ inputs.glslang_version }} -m "glslang ${{ inputs.glslang_version }}"
          git push origin main --tags
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v${{ inputs.glslang_version }} \
            --repo ${{ github.repository }} \
            --title "glslang ${{ inputs.glslang_version }}" \
            $WINDOWS_ARTIFACT_NAME.tar.xz \
            $LINUX_ARTIFACT_NAME.tar.xz
